{% extends "base.html" %}
{% block title %}Add Transaction — FinFlow{% endblock %}
{% block content %}

<div class="section-title">New Transaction</div>
<div class="section-sub">Fill in the details below</div>

<form class="form-card" method="POST" id="txnForm">
  <div>
    <label class="form-label">Type</label>
    <div class="type-toggle">
      <button type="button" class="type-btn expense selected" id="btnExpense" onclick="selectType('expense')">💸 Expense</button>
      <button type="button" class="type-btn income" id="btnIncome" onclick="selectType('income')">💰 Income</button>
    </div>
    <input type="hidden" name="type" id="typeField" value="expense">
  </div>

  <div>
    <label class="form-label">Amount (₹)</label>
    <input class="form-input" type="number" step="0.01" name="amount" placeholder="0.00" required>
  </div>

  <div>
    <label class="form-label">Category</label>
    <select class="form-select" name="category" required>
      {% for c in categories %}
      <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="form-label">Description</label>
    <input class="form-input" type="text" name="description" placeholder="What was this for?">
  </div>

  <div>
    <label class="form-label">Date</label>
    <input class="form-input" type="date" name="date" value="{{ today }}" required>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" type="submit">✓ Add Transaction</button>
    <a class="btn btn-ghost" href="{{ url_for('transactions_page') }}" style="text-decoration:none; display:inline-flex; align-items:center;">Cancel</a>
  </div>
</form>

{% endblock %}

{% block scripts %}
<script>
  function selectType(type) {
    document.getElementById('typeField').value = type;
    document.getElementById('btnExpense').classList.toggle('selected', type === 'expense');
    document.getElementById('btnIncome').classList.toggle('selected', type === 'income');
  }
</script>
{% endblock %}
